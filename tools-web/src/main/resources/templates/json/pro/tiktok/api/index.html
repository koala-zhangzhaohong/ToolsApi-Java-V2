<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}"></title>
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <link href="../assets/css/tiktok-searcher.css" th:href="@{/assets/css/tiktok-searcher.css}" rel="stylesheet">
    <link href="../assets/css/font-awesome.all.min.css" th:href="@{/assets/css/font-awesome.all.min.css}"
          rel="stylesheet">
    <link href="../assets/css/loading.css" th:href="@{/assets/css/loading.css}" rel="stylesheet">
    <link href="../assets/css/loading-download.css" th:href="@{/assets/css/loading-download.css}" rel="stylesheet">
    <script type="text/javascript" src="../assets/js/Util.js"
            th:src="@{/assets/js/Util.js(v=1.0)}"></script>
</head>
<style>
    .info-desc {
        font-size: 16px;
        font-weight: bold;
        padding-top: 6px;
        padding-bottom: 6px;
    }

    .info-nickname {
        font-size: 14px;
        font-weight: normal;
        color: gray;
        padding-top: 6px;
        padding-bottom: 6px;
    }

    .info-unique-id, .info-user-id {
        font-size: 10px;
        font-weight: normal;
        color: gray;
        padding-top: 2px;
        padding-bottom: 2px;
        margin-left: auto;
        text-align: right;
        /*display: -webkit-box;*/
        /*-webkit-line-clamp: 1; !* 限制显示的行数为3 *!*/
        /*-webkit-box-orient: vertical;*/
        overflow: hidden;
        text-overflow: ellipsis; /* 显示省略号 */
        white-space: nowrap;
        /*text-align: center;*/
        width: 100%;
    }

    .info-wrapper {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
    }

    .info-wrapper-fix {
        padding-top: 6px;
        margin-left: -6px;
        margin-right: -6px;
    }

    .info-desc {
        grid-column-start: 1;
        grid-column-end: 3;
        grid-row-start: 1;
        grid-row-end: 3;
    }

    .info-nickname {
        grid-column-start: 1;
        grid-row-start: 3;
        grid-row-end: 5;
        align-content: center;
    }

    .info-button {
        flex: 1 1 calc(50% - 10px); /* 每行两个 item，减去间隔的一半 */
        box-sizing: border-box;
        display: -webkit-box;
        -webkit-line-clamp: 1; /* 限制显示的行数为3 */
        -webkit-box-orient: vertical;
        overflow: hidden;
        text-overflow: ellipsis; /* 显示省略号 */
        white-space: nowrap;
        text-align: center;
        margin: 6px;
        -webkit-user-select: none; /* Safari */
        -moz-user-select: none;    /* Firefox */
        -ms-user-select: none;     /* IE 10+ */
        user-select: none;         /* 标准语法 */
        -webkit-touch-callout: none; /* 禁用 iOS 长按弹出菜单 */
    }

    .info-button {
        background: #e0e8ff;
        padding: 8px 18px;
        border-radius: 20px;
        font-size: 0.9rem;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    .info-button:hover {
        background: #5a7dfa;
        color: white;
    }

    /* 当 n 为单数时，最后一个 item 占满整行 */
    .info-button:last-child:nth-child(odd) {
        flex: 1 1 100%;
    }

    .info-hr {
        background: darkgray;
        height: 2px;
        margin-top: -10px;
    }

    .info-desc, .info-nickname, .info-user-id, .info-unique-id {
        word-break: break-all;
    }

    /* 指定 div 下的所有 a 标签 */
    .info-link {
        color: #0066cc;          /* 设置链接文字颜色 */
        text-decoration: none;   /* 去除下划线 */
        transition: all 0.3s;    /* 添加平滑过渡效果 */
    }
</style>
<body>
<div id="loading-overlay">
    <div class="arc"></div>
    <h1><span>LOADING</span></h1>
</div>
<div class="container">
    <div class="header">
        <h1><i class="fas fa-search"></i> 智能解析</h1>
        <p>快速解析您需要的内容</p>
    </div>

    <div class="data-container">
        <div class="api-data-container">
            <div class="api-data-header">
                <div class="api-data-title">查询结果</div>
                <button class="refresh-btn" style="display: none">
                    <i class="fas fa-trash"></i> 刷新数据
                </button>
            </div>
            <div id="api-empty-data" class="empty-data">暂无数据</div>
            <div id="api-data"></div>
        </div>
        <div class="info-container" id="info-container" style="display: none">
            <div class="info-header">
                <div class="info-title">数据详情</div>
            </div>
            <hr class="info-hr"/>
            <div class="info-wrapper"></div>
        </div>
        <div class="info-ranklist-container" id="info-ranklist-container" style="display: none">
            <div class="info-ranklist-header">
                <div class="info-ranklist-title">用户榜单查询</div>
            </div>
            <hr class="info-hr"/>
            <div class="info-wrapper info-wrapper-fix"></div>
        </div>
        <div class="info-preview-container" id="info-preview-container" style="display: none">
            <div class="info-preview-header">
                <div class="info-preview-title">预览</div>
            </div>
            <hr class="info-hr"/>
            <div class="info-wrapper info-wrapper-fix"></div>
        </div>
        <div class="info-download-container" id="info-download-container" style="display: none">
            <div class="info-download-header">
                <div class="info-download-title">下载</div>
            </div>
            <hr class="info-hr"/>
            <div class="info-wrapper info-wrapper-fix"></div>
        </div>
        <div class="explain-container">* 仅供学习使用，禁止用于商业用途</div>
    </div>
</div>
<script type="text/javascript" src="../assets/js/tiktok-searcher.js"
        th:src="@{/assets/js/tiktok-searcher.js(v=1.0)}"></script>
<script>
    setCurrentHost("[[${host}]]");
    setData(Util.htmlspecialchars_decode("[[${jsonData}]]").replaceAll("\n", "\\n"));
</script>
</body>
</html>
