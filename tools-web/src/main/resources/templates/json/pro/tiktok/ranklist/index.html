<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}"></title>
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <link href="../assets/css/tiktok-searcher.css" th:href="@{/assets/css/tiktok-searcher.css}" rel="stylesheet">
    <link href="../assets/css/font-awesome.all.min.css" th:href="@{/assets/css/font-awesome.all.min.css}"
          rel="stylesheet">
    <script type="text/javascript" src="../assets/js/Util.js"
            th:src="@{/assets/js/Util.js}"></script>
</head>
<style type="text/css">
    table {
        border-collapse: collapse;
        margin: 0 auto;
        text-align: center;
        table-layout: fixed;
        width: 100%;
    }

    table td, table th {
        border: 1px solid #cad9ea;
        color: #666;
        height: 30px;
        text-align: center;
        word-wrap: break-word;
        padding: 8px;
    }

    table thead th {
        background-color: #CCE8EB;
        width: 100px;
    }

    table tr:nth-child(odd) {
        background: #fff;
    }

    table tr:nth-child(even) {
        background: #F5FAFA;
    }
</style>
<body>
<div class="container">
    <div class="header">
        <h1><i class="fas fa-search"></i> 智能解析</h1>
        <p>快速解析您需要的内容</p>
    </div>

    <div class="data-container">
        <div class="api-data-container">
            <div class="api-data-header">
                <div class="api-data-title">查询结果</div>
                <button class="refresh-btn">
                    <i class="fa fa-refresh"></i> 刷新数据
                </button>
            </div>
            <div>
                <table width="90%" class="table">
                    <thead id="ranklist-table">
                    <tr>
                        <th>昵称</th>
                        <th>账号</th>
                        <th>原始昵称</th>
                    </tr>
                    </thead>
                </table>
                <div id="ranklist-empty-data" class="empty-data">暂无数据</div>
            </div>
        </div>
        <div class="explain-container">* 仅供学习使用，禁止用于商业用途</div>
    </div>
</div>
<script type="text/javascript" src="../assets/js/tiktok-searcher.js"
        th:src="@{/assets/js/tiktok-searcher.js}"></script>
<script>
    setCurrentHost("[[${host}]]");
    setData(Util.htmlspecialchars_decode("[[${jsonData}]]"));
</script>
</body>
</html>
