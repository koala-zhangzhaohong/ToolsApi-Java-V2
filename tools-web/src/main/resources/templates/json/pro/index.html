<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}"></title>
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <script type="text/javascript" src="../assets/js/Util.js"
            th:src="@{/assets/js/Util.js}"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            font-size: 16px;
            font-family: "Consolas", "Arial", "Monaco", "Osaka", "serif";
            background-color: #272822;
            color: #fff
        }

        body {
            overflow-y: scroll;
            overflow-x: hidden;
        }

        pre {
            white-space: pre-wrap;
            word-wrap: break-word;
            overflow-wrap: break-word;
            display: block;
        }

        #json-renderer {
            padding: 1em 2em;
        }

        ul.json-dict, ol.json-array {
            list-style-type: none;
            margin: 0 0 0 1px;
            border-left: 1px dotted #666;
            padding-left: 2em;
        }

        .json-key {
            color: #7bdcfe;
        }

        .json-value {
            color: #ce9178;
        }

        .json-literal {
            color: #b5cea8;
        }

        a.json-toggle {
            position: relative;
            color: inherit;
            text-decoration: none;
            cursor: pointer;
        }

        a.json-toggle:focus {
            outline: none;
        }

        a.json-toggle:before {
            font-size: 1.1em;
            color: #666;
            content: "\25BC";
            position: absolute;
            display: inline-block;
            width: 1em;
            text-align: center;
            line-height: 1em;
            left: -1.2em;
        }

        a.json-toggle:hover:before {
            color: #aaa;
        }

        a.json-toggle.collapsed:before {
            content: "\25B6";
        }

        a.json-placeholder {
            color: #aaa;
            padding: 0 1em;
            text-decoration: none;
            cursor: pointer;
        }

        a.json-placeholder:hover {
            text-decoration: underline;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
<pre id="json-renderer"></pre>
</body>
<script>
    class JSONViewer {
        constructor(options = {}) {
            this.options = Object.assign({rootCollapsable: true, clickableUrls: true, bigNumbers: false}, options);
        }


        isCollapsable(arg) {
            return arg instanceof Object && Object.keys(arg).length > 0;
        }


        isUrl(string) {
            const protocols = ['http', 'https', 'ftp', 'ftps'];
            return protocols.some(protocol => string.startsWith(protocol + '://'));
        }


        htmlEscape(s) {
            return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/'/g, '&apos;').replace(/"/g, '&quot;');
        }


        json2html(json) {
            let html = '';
            if (typeof json === 'string') {
                json = this.htmlEscape(json);
                if (this.options.clickableUrls && this.isUrl(json)) {
                    html += `<a href="${json}" class="json-value" target="_blank">${json}</a>`;
                } else {
                    json = json.replace(/&quot;/g, '\\&quot;');
                    html += `<span class="json-value">"${json}"</span>`;
                }
            } else if (typeof json === 'number' || typeof json === 'bigint') {
                html += `<span class="json-literal">${json}</span>`;
            } else if (typeof json === 'boolean') {
                html += `<span class="json-literal">${json}</span>`;
            } else if (json === null) {
                html += '<span class="json-literal">null</span>';
            } else if (Array.isArray(json)) {
                if (json.length > 0) {
                    html += '[<ol class="json-array">';
                    for (let i = 0; i < json.length; ++i) {
                        html += '<li>';
                        if (this.isCollapsable(json[i])) {
                            html += '<a class="json-toggle"></a>';
                        }
                        html += this.json2html(json[i]);
                        if (i < json.length - 1) {
                            html += ',';
                        }
                        html += '</li>';
                    }
                    html += '</ol>]';
                } else {
                    html += '[]';
                }
            } else if (typeof json === 'object') {
                if (this.options.bigNumbers && (typeof json.toExponential === 'function' || json.isLosslessNumber)) {
                    html += `<span class="json-literal">${json.toString()}</span>`;
                } else {
                    const keyCount = Object.keys(json).length;
                    if (keyCount > 0) {
                        html += '{<ul class="json-dict">';
                        let count = 0;
                        for (const key in json) {
                            if (Object.prototype.hasOwnProperty.call(json, key)) {
                                const jsonElement = json[key];
                                const escapedKey = this.htmlEscape(key);
                                const keyRepr = `<span class="json-key">"${escapedKey}"</span>`;
                                html += '<li>';
                                if (this.isCollapsable(jsonElement)) {
                                    html += `<a class="json-toggle">${keyRepr}</a>`;
                                } else {
                                    html += keyRepr;
                                }
                                html += ': ' + this.json2html(jsonElement);
                                if (++count < keyCount) {
                                    html += ',';
                                }
                                html += '</li>';
                            }
                        }
                        html += '</ul>}';
                    } else {
                        html += '{}';
                    }
                }
            }
            return html;
        }


        render(jsonData) {
            const html = this.json2html(jsonData);
            const rootElement = document.getElementById('json-renderer');
            rootElement.innerHTML = html;
        }
    }

    const inputJson = Util.htmlspecialchars_decode("[[${jsonData}]]");
    if (!inputJson) {
        document.write('Empty json data.');
    } else {
        try {
            /* bool clickableUrls   Click on the link in json to jump. */
            const viewer = new JSONViewer({clickableUrls: false});
            viewer.render(JSON.parse(inputJson));
        } catch (error) {
            document.write('Wrong json format.');
        }
    }
</script>
</html>
