<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}"></title>
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Tiktok Searcher</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #ecf0f1;
        }

        .container {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }

        .search-box {
            position: relative;
            background: #2c3e50;
            height: 40px;
            border-radius: 40px;
            padding: 10px;
        }

        .search-input {
            position: relative;
            border: none;
            background: none;
            outline: none;
            color: white;
            font-size: 22px;
            line-height: 40px;
            height: 40px;
            transition: .5s;
            padding: 0px 40px 0 0;
            width: 60vw;
        }

        .search-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            text-decoration: none;
            color: #e74c3c;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: white;
            transition: .5s;
        }

        .search-ico {
            margin: 12px;
            width: 16px;
            height: 16px;
        }

        .loading {
            position: relative;
            width: 200px;
            height: 50px;
            display: flex;
        }

        .eat {
            position: relative;
            width: 50px;
            height: 50px;
            left: 0;
            color: #ff0000;
            animation: eat-animate 2.4s ease-in-out infinite;
        }

        @keyframes eat-animate {
            100% {
                left: 150px;
            }
        }

        .eat::before {
            content: '';
            position: absolute;
            width: 0;
            height: 0;
            width: 50px;
            height: 25px;
            top: 0;
            border-radius: 50px 50px 0 0;
            background: currentColor;
            transform: rotate(-30deg);
            animation: eat-top 2.4s ease-in-out infinite;
        }

        @keyframes eat-top {
            20% {
                transform: rotate(-30deg);
            }
            35% {
                transform: rotate(0deg);
            }
            45% {
                transform: rotate(-30deg);
            }
            60% {
                transform: rotate(0deg);
            }
            70% {
                transform: rotate(-30deg);
            }
            85% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(0deg);
            }
        }

        .eat::after {
            content: '';
            position: absolute;
            width: 0;
            height: 0;
            width: 50px;
            height: 25px;
            bottom: 0;
            border-radius: 0 0 50px 50px;
            background: currentColor;
            transform: rotate(30deg);
            animation: eat-bottom 2.4s ease-in-out infinite;
        }

        @keyframes eat-bottom {
            20% {
                transform: rotate(30deg);
            }
            35% {
                transform: rotate(0deg);
            }
            45% {
                transform: rotate(30deg);
            }
            60% {
                transform: rotate(0deg);
            }
            70% {
                transform: rotate(30deg);
            }
            85% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(0deg);
            }
        }

        .load {
            position: relative;
            width: 30px;
            height: 30px;
            margin: 10px;
            color: #e47272;
            border-radius: 50%;
            background: currentColor;
        }

        .load:nth-child(2) {
            animation: load1 2.4s linear infinite;
            transform: scale(1);
        }

        @keyframes load1 {
            35% {
                transform: scale(0);
            }
            100% {
                transform: scale(0);
            }
        }

        .load:nth-child(3) {
            animation: load2 2.4s linear infinite;
            transform: scale(1);
        }

        @keyframes load2 {
            30% {
                transform: scale(1);
            }
            58% {
                transform: scale(0);
            }
            100% {
                transform: scale(0);
            }
        }

        .load:nth-child(4) {
            animation: load3 2.4s linear infinite;
            transform: scale(1);
        }

        @keyframes load3 {
            60% {
                transform: scale(1);
            }
            80% {
                transform: scale(0);
            }
            100% {
                transform: scale(0);
            }
        }

        .loading-container {
            display: none;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="search-box">
        <input type="text" class="search-input" id="search-input">
        <div class="search-btn" id="search-btn">
            <div class="search-ico">
                <img id="search" src="../assets/svg/search.svg" th:src="@{/assets/svg/search.svg}" alt=""/>
            </div>
        </div>
    </div>
</div>
<div class="container loading-container" id="loading-container">
    <div class="loading">
        <div class="eat"></div>
        <div class="load"></div>
        <div class="load"></div>
        <div class="load"></div>
    </div>
</div>
</body>
<script>
    const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));
    let input = "";
    const loadingElement = document.getElementById("loading-container");
    const inputElement = document.getElementById('search-input');
    inputElement.addEventListener('input', (event) => {
        input = event.target.value;
    });
    document.getElementById('search-btn').onclick = async function () {
        if (input !== "") {
            loadingElement.style = "display: inline;"
            await sleep(2000);
            window.location.href = "[[${host}]]tools/DouYin/api?version=4&type=simple&directJsonViewer=true&link=" + encodeURIComponent(input)
            inputElement.value = "";
            loadingElement.style = "display: none;"
            return;
        }
        if (input === "") {
            alert("分享链接不可为空， 请重新输入")
        }
    };
</script>
</html>
