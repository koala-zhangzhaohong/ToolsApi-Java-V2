<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title th:text="${title}"></title>
    <!-- 预加载，为什么预加载，因为m3u8需要命中缓存 -->
    <link rel="preconnect" href="douyincdn.com">
    <link rel="preconnect" href="douyinliving.com">
    <!-- css js -->
    <link href="../assets/css/custom-player.css" th:href="@{/assets/css/custom-player.css}" rel="stylesheet">
    <script src="../assets/js/polyfill.min.js" th:src="@{/assets/js/polyfill.min.js}"></script>
    <th:block th:if="${type == 'hls'}">
        <script src="../assets/js/hls.js" th:src="@{/assets/js/hls.js}"></script>
    </th:block>
    <th:block th:if="${type == 'flv'}">
        <script src="../assets/js/flv.js" th:src="@{/assets/js/flv.js}"></script>
    </th:block>
    <script src="../assets/js/DPlayer.min.js" th:src="@{/assets/js/DPlayer.min.js}"></script>
</head>
<body class="custom-container">
<div id="video-player" class="dk-video-player-custom">
    <meta name="referrer" content="never">
</div>
<script>
    let dp;
    let qualityIndex = 0;
    const videoElement = document.getElementById('video-player');
    const qualityList = [];
    if (checkContentIsNotEmpty("[[${multi.getFullHd1()}]]")) {
        qualityList.push({
            name: '蓝光',
            url: '[[${multi.getFullHd1()}]]',
            type: '[[${type}]]',
        });
    }
    if (checkContentIsNotEmpty("[[${multi.getHd1()}]]")) {
        qualityList.push({
            name: '超清',
            url: '[[${multi.getHd1()}]]',
            type: '[[${type}]]',
        });
    }
    if (checkContentIsNotEmpty("[[${multi.getSd1()}]]")) {
        qualityList.push({
            name: '高清',
            url: '[[${multi.getSd1()}]]',
            type: '[[${type}]]',
        });
    }
    if (checkContentIsNotEmpty("[[${multi.getSd2()}]]")) {
        qualityList.push({
            name: '标清',
            url: '[[${multi.getSd2()}]]',
            type: '[[${type}]]',
        });
    }

    const handleError = (err) => {
        console.error('视频加载失败，正在尝试重连...', err);
        // try {
        //     dp.video.load();
        //     dp.video.play();
        // } catch (e) {
        //     try {
        //         initDp();
        //         preparePlay();
        //     } catch (e) {
        //         console.error('视频加载失败', e);
        //     }
        // }
        if (dp.type === 'hls' && window.Hls && window.Hls.isSupported()) {
            const hls = dp.plugins.hls;
            if (hls && hls.error && hls.error.fatal) {
                hls.startLoad(); // 网络错误重试
            }
        }
    }

    const onChangeQuality = (quality) => {
        // 可显示加载动画或提示
        let index = 0;
        for (const qualityItem of qualityList) {
            if (qualityItem.name === quality.name) {
                qualityIndex = index;
                break;
            }
            index++;
        }
        initDp();
        setTimeout(() => {
            dp.play();
        }, 500); // 延迟500毫秒
    }

    function checkContentIsNotEmpty(input) {
        if (input && input.length > 0) {
            if (input !== "null" && input !== "") {
                return true;
            }
        }
        return false;
    }

    function preparePlay(muted) {
        if ('[[${type}]]' === 'hls') {
            setTimeout(() => {
                dp.video.muted = muted;
                dp.play();
            }, 500); // 延迟500毫秒
        }
        if (checkIsMobile()) {
            document.querySelector('.dplayer').addEventListener('click', () => {
                if (dp.video.muted) {
                    dp.volume(0.8);  // 使用DPlayer的volume方法 [src/js/player.js#L287](https://link.gitcode.com/i/272768102819405aeb7b48dcab844a49#L287)
                }
            });
        }
    }

    function checkIsMobile() {
        return /Android|iPhone|iPad|iPod|BlackBerry|webOS|Windows Phone|SymbianOS|IEMobile|Opera Mini/i.test(navigator.userAgent);
    }

    function safeDestroyPlayer() {
        if (dp) {
            // 1. 停止视频播放
            if (!dp.video.paused) {
                dp.pause();
            }
            // 2. 调用 DPlayer 销毁方法
            // 尝试销毁底层插件
            if (dp.plugins) {
                if (dp.plugins.hls) dp.plugins.hls.destroy();
                if (dp.plugins.flv) dp.plugins.flv.destroy();
            }
            dp.destroy();
            // 3. 清理 DOM 节点
            const container = dp.container;
            if (container) {
                container.innerHTML = '';
            }
            // 4. 解除引用
            dp = null;
            console.log('DPlayer 已彻底销毁');
        }
    }

    function initDp() {
        safeDestroyPlayer();
        dp = new DPlayer({
            container: videoElement,
            video: {
                quality: qualityList,
                defaultQuality: qualityIndex,
                type: '[[${type}]]'
            },
            customType: {
                hls: function (video, player) {
                    const hls = new Hls();
                    hls.loadSource(video.src);
                    hls.attachMedia(video);
                    hls.on(Hls.Events.MANIFEST_PARSED, function () {
                        video.play();
                    });
                    hls.sessionId = crypto.randomUUID();
                    player.sessionId = hls.sessionId;
                    player.events.on('destroy', () => {
                        hls.destroy();
                    });
                    player.events.on('quality_end', () => {
                        if (hls.sessionId !== player.sessionId) {
                            hls.destroy();
                        }
                    });
                },
                flv: function (video, player) {
                    const flvPlayer = flvjs.createPlayer({
                        type: 'flv',
                        url: video.src
                    });
                    flvPlayer.attachMediaElement(video);
                    flvPlayer.load();
                    flvPlayer.play();
                }
            },
            pluginOptions: {
                hls: {
                    enableWorker: true,
                    lowLatencyMode: true, // 降低直播延迟
                    backBufferLength: 30,
                    maxMaxBufferLength: 30,
                    maxBufferLength: 10,    // 最大缓冲时长（秒）
                    maxBufferSize: 0,  // 最大缓冲大小（字节）
                    liveSyncDuration: 3,
                    liveSyncDurationCount: 2,
                    liveMaxLatencyDurationCount: 6,
                    startLevel: -1,
                    abrEwmaDefaultEstimate: 5e5,
                    maxBufferHole: 0.5,
                    keyLoader: (uri, callback) => {
                        fetch(uri, {
                            headers: {
                                'Referer': 'https://www.douyin.com/'
                            }
                        })
                            .then(response => response.arrayBuffer())
                            .then(key => callback(null, new Uint8Array(key)))
                            .catch(error => callback(error));
                    }
                },
                flv: {
                    isLive: true,
                    enableWorker: true,
                    enableStashBuffer: false,
                    lazyLoad: true,
                    lazyLoadMaxDuration: 180,
                    cors: true
                }
            },
            autoplay: false,
            hotkey: true,
            airplay: true,
            live: true,
            preload: 'none',
            muted: true
        });
        dp.on('quality_start', onChangeQuality);
        // 监听错误并自动恢复
        dp.on('error', handleError);
    }

    document.addEventListener('DOMContentLoaded', function () {
        initDp();
        if (window.self !== window.top) {
            if ("[[${key}]]" === "[[${lastKey}]]") {
                console.log("on reload player", "[[${key}]]");
                initDp();
                preparePlay(true);
            } else {
                console.log("on load player", "current: [[${key}]]", "last: [[${lastKey}]]");
                preparePlay(false);
            }
        } else {
            console.log("on load player");
            preparePlay(true);
        }
    });
</script>
</body>
