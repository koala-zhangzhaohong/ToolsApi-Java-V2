<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title th:text="${title}"></title>
    <!-- 预加载，为什么预加载，因为m3u8需要命中缓存 -->
    <link rel="preconnect" href="douyincdn.com">
    <link rel="preconnect" href="douyinliving.com">
    <th:block th:if="${type == 'hls'}">
        <link rel="preload" as="fetch" type="video/m3u8" th:href="${multi.getFullHd1()}" crossorigin="anonymous">
        <link rel="preload" as="fetch" type="video/m3u8" th:href="${multi.getHd1()}" crossorigin="anonymous">
        <link rel="preload" as="fetch" type="video/m3u8" th:href="${multi.getSd1()}" crossorigin="anonymous">
        <link rel="preload" as="fetch" type="video/m3u8" th:href="${multi.getSd2()}" crossorigin="anonymous">
    </th:block>
    <!-- css js -->
    <link href="../assets/css/custom-player.css" th:href="@{/assets/css/custom-player.css}" rel="stylesheet">
    <script src="../assets/js/polyfill.min.js" th:src="@{/assets/js/polyfill.min.js}"></script>
    <th:block th:if="${type == 'hls'}">
        <script src="../assets/js/hls.js" th:src="@{/assets/js/hls.js}"></script>
    </th:block>
    <th:block th:if="${type == 'flv'}">
        <script src="../assets/js/flv.js" th:src="@{/assets/js/flv.js}"></script>
    </th:block>
    <script src="../assets/js/DPlayer.min.js" th:src="@{/assets/js/DPlayer.min.js}"></script>
</head>
<body class="custom-container">
<div id="video-player" class="dk-video-player-custom">
    <meta name="referrer" content="never">
</div>
<script>
    const videoElement = document.getElementById('video-player');
    const qualityList = [];
    if (checkContentIsNotEmpty("[[${multi.getFullHd1()}]]")) {
        qualityList.push({
            name: '蓝光',
            url: '[[${multi.getFullHd1()}]]',
            type: '[[${type}]]',
        });
    }
    if (checkContentIsNotEmpty("[[${multi.getHd1()}]]")) {
        qualityList.push({
            name: '超清',
            url: '[[${multi.getHd1()}]]',
            type: '[[${type}]]',
        });
    }
    if (checkContentIsNotEmpty("[[${multi.getSd1()}]]")) {
        qualityList.push({
            name: '高清',
            url: '[[${multi.getSd1()}]]',
            type: '[[${type}]]',
        });
    }
    if (checkContentIsNotEmpty("[[${multi.getSd2()}]]")) {
        qualityList.push({
            name: '标清',
            url: '[[${multi.getSd2()}]]',
            type: '[[${type}]]',
        });
    }

    function checkContentIsNotEmpty(input) {
        if (input && input.length > 0) {
            if (input !== "null" && input !== "") {
                return true;
            }
        }
        return false;
    }

    function preparePlay(current) {
        if ('[[${type}]]' === 'hls') {
            setTimeout(() => {
                current.video.muted = true;
                current.play();
            }, 500); // 延迟500毫秒
        }
        // videoElement.addEventListener('click', () => {
        //     if (current.video.muted) {
        //         current.volume(0.7);  // 使用DPlayer的volume方法 [src/js/player.js#L287](https://link.gitcode.com/i/272768102819405aeb7b48dcab844a49#L287)
        //     }
        // });
    }

    function initDp() {
        const dp = new DPlayer({
            container: videoElement,
            video: {
                quality: qualityList,
                defaultQuality: 0,
                type: '[[${type}]]'
            },
            pluginOptions: {
                hls: {
                    lowLatencyMode: true, // 降低直播延迟
                    backBufferLength: 90,
                    maxBufferLength: 180,    // 最大缓冲时长（秒）
                    maxBufferSize: 200 * 1024 * 1024,  // 最大缓冲大小（字节）
                    liveSyncDurationCount: 3,
                    startLevel: -1,
                    keyLoader: (uri, callback) => {
                        fetch(uri, {
                            headers: {
                                'Referer': 'https://www.douyin.com/'
                            }
                        })
                            .then(response => response.arrayBuffer())
                            .then(key => callback(null, new Uint8Array(key)))
                            .catch(error => callback(error));
                    }
                },
                flv: {
                    isLive: true,
                    enableWorker: true,
                    enableStashBuffer: false,
                    lazyLoad: true,
                    lazyLoadMaxDuration: 180,
                    cors: true
                }
            },
            autoplay: true,
            hotkey: true,
            airplay: true,
            live: true,
            preload: 'none',
            muted: true
        });
        // 监听错误并自动恢复
        dp.on('error', (err) => {
            if (dp.type === 'hls' && window.Hls && window.Hls.isSupported()) {
                const hls = dp.plugins.hls;
                if (hls && hls.error && hls.error.fatal) {
                    hls.startLoad(); // 网络错误重试
                }
            }
        });
        return dp;
    }

    document.addEventListener('DOMContentLoaded', function () {
        const dp = initDp();
        if (window.self !== window.top) {
            if ("[[${key}]]" === "[[${lastKey}]]") {
                console.log("on reload player", "[[${key}]]");
                videoElement.innerHTML = '';
                const player = initDp();
                preparePlay(player);
            } else {
                console.log("on load player", "current: [[${key}]]", "last: [[${lastKey}]]");
                // preparePlay(dp);
            }
        } else {
            console.log("on load player");
            preparePlay(dp);
        }
    });
</script>
</body>
